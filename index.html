<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Tool</title>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:400px;
}
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
    <h2>Roblox Profile Checker</h2>
    <p>Enter your Roblox profile link:</p>
    <input type="text" placeholder="https://www.roblox.com/users/...">
    <button>Submit</button>
</div>
</body>
</html>
