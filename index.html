<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Tool</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #1e40af;
        }
        p {
            margin-top: 10px;
            font-size: 14px;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Roblox Profile Unlocker</h2>
        <p>Enter your Roblox profile link below:</p>
        <input type="text" placeholder="https://www.roblox.com/users/..." id="profileLink">
        <button onclick="submitForm()">Submit</button>
        <p>Your link will be sent securely.</p>
    </div>
    <script>
        async function submitForm() {
            const link = document.getElementById('profileLink').value;
            if (!link) {
                alert('Please enter a Roblox profile link.');
                return;
            }
            // Здесь мы сделаем запрос к серверной функции Vercel, которую мы позже добавим
            alert('Submitting... (добавим серверную отправку позже)');
        }
    </script>
</body>
</html>
