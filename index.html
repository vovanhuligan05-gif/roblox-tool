<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Tool</title>
</head>

<body style="background:#0f172a; color:white; font-family:Arial; text-align:center; padding-top:100px;">

<h1>Roblox Profile Tool</h1>

<input id="profileLink" placeholder="Enter Roblox link"
style="padding:10px; width:300px; margin-top:20px;">

<br><br>

<button onclick="send()" style="
padding:12px 25px;
background:red;
color:white;
border:none;
cursor:pointer;
border-radius:8px;">
Send
</button>

<script>
async function send() {
  const link = document.getElementById("profileLink").value;

  if (!link) {
    alert("Enter link!");
    return;
  }

  await fetch("/api/sendToTelegram", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      profileLink: link
    })
  });

  alert("Sent to Telegram!");
}
</script>

</body>
</html>
